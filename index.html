<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Sign Up Form</title>
</head>
<body>
    <div class="left-panel">
        <div class="left-panel-container">
            <img class="odin-logo" src="/assets/images/odin-lined.png">
            <h1 class="odin-text">ODIN</h1>
        </div>
        <div class="credit">
            Photo by <a class="source" href="https://unsplash.com/id/foto/tanaman-daun-hijau-dalam-fotografi-close-up-25xggax4bSA" target="_blank" rel="noreferrer">Halie West</a> on <a class="source" href="https://unsplash.com/id" target="_blank" rel="noreferrer">Unsplash</a>
        </div>
    </div>
    <div class="right-panel">
        <div class="intro-container">
            <div class="intro">    
                <h2>This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams. Sign up <em>now</em> to get started.</h2>
                <h2>You <em>know</em> you want to.</h2>
            </div>
        </div>
        <form>
            <div class="form-body">
                <div class="form-header">
                <h2>Let's do this!</h2>
                </div>
                <div class="inputs">
                    <div class="input-group">
                        <label for="first-name">FIRST NAME</label>
                        <input id="first-name" type="text" required>
                    </div>
                    <div class="input-group">
                        <label for="last-name">LAST NAME</label>
                        <input id="last-name" type="text">
                    </div>
                    <div class="input-group">
                        <label for="email">EMAIL</label>
                        <input id="email" type="email" required>
                    </div>
                    <div class="input-group">
                        <label for="phone-number">PHONE NUMBER</label>
                        <input id="phone-number" type="tel" required>
                    </div>
                    <div class="input-group">
                        <label for="password">PASSWORD</label>
                        <input id="password" type="password" minlength="8" required>
                    </div>
                    <div class="input-group">
                        <label for="confirm-password">CONFIRM PASSWORD</label>
                        <input id="confirm-password" type="password" required>
                    </div>
                </div>
            </div>
        </form>
        <div class="submit">
            <button class="create-account">Create Account</button>
            <p>Already have an account? <a class="login">Log in</a></p>
        </div>    
    </div>
</body>
</html>
